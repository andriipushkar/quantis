# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /var/lib/quantis/postgres:/var/lib/postgresql/data

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - /var/lib/quantis/redis:/data

  api-gateway:
    restart: always
    build:
      context: .
      dockerfile: server/api-gateway/Dockerfile
    volumes: []  # No source mounting in prod

  data-collector:
    restart: always
    build:
      context: .
      dockerfile: server/data-collector/Dockerfile
    volumes: []

  analysis-engine:
    restart: always
    build:
      context: .
      dockerfile: server/analysis-engine/Dockerfile
    volumes: []

  alert-service:
    restart: always
    build:
      context: .
      dockerfile: server/alert-service/Dockerfile
    volumes: []

  client:
    restart: always
    build:
      context: .
      dockerfile: client/Dockerfile
    volumes: []

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
