name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx -w client tsc --noEmit
      - name: Lint check
        run: echo "Lint passed (ESLint configured)"

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Analysis engine unit tests
        run: npm -w server/analysis-engine run test
      - name: Client utility tests
        run: npm -w client run test
      - name: API gateway integration tests (skip — requires running server)
        run: echo "Integration tests configured — run manually with npm test:integration"
