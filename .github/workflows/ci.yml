name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build shared package
        run: npm -w shared run build

      - name: Typecheck — shared
        run: npx tsc --noEmit --project shared/tsconfig.json

      - name: Typecheck — client
        run: npx -w client tsc --noEmit

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

  test:
    name: Tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - shared
          - server/api-gateway
          - server/analysis-engine
          - server/data-collector
          - server/alert-service
          - client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build shared (dependency)
        run: npm -w shared run build

      - name: Run tests
        run: npm -w ${{ matrix.workspace }} run test

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build shared
        run: npm -w shared run build

      - name: Build client
        run: npm -w client run build
